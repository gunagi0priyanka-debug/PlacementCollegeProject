{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | CareerFlow</title>
    <link rel="stylesheet" href="{% static 'CSS/style.css' %}">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>Student</h2>
            <ul>
                <li><a href="{% url 'student_dashboard' %}">Dashboard</a></li>
                <li><a href="{% url 'student_profile' %}" class="active">Profile</a></li>
                <li><a href="{% url 'student_jobs' %}">Job Listings</a></li>
                <li><a href="{% url 'student_applied' %}">Applied Jobs</a></li>
                <li><a href="{% url 'logout' %}">Logout</a></li>
            </ul>
        </div>

        <div class="main-content">
            <div class="header">
                <h1>Profile Management</h1>
                <p>Update your academic percentages and technical skillsets for screening filters.</p>
            </div>

            <div class="table-box" style="border-top: 4px solid #3b82f6; max-width: 800px;">
                <h2 style="margin-bottom: 25px; color: #1e3a8a;">Academic Details</h2>
                
                <form method="POST" action="{% url 'student_profile' %}">
                    {% csrf_token %}
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                        <div class="form-group">
                            <label>Email Address (Read-only)</label>
                            <input type="email" value="{{ request.user.email }}" style="background: #f1f5f9; color: #64748b; cursor: not-allowed;" readonly>
                        </div>
                        
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="text" name="phone" value="{{ student.phone|default:'' }}" placeholder="e.g. 9876543210">
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                        <div class="form-group">
                            <label>Course / Department</label>
                            <input type="text" name="course" value="{{ student.course|default:'' }}" placeholder="e.g. B.Tech CSE">
                        </div>
                        
                        <div class="form-group">
                            <label>Percentage / CGPA</label>
                            <input type="text" name="cgpa" value="{{ student.cgpa|default:student.percentage|default:'' }}" placeholder="e.g. 8.50">
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 25px;">
                        <label>Technical Skills</label>
                        <textarea name="skills" rows="4" placeholder="e.g. Python, Django, SQL, HTML, CSS, JavaScript" style="width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 1rem; resize: vertical;">{{ student.skills|default:'' }}</textarea>
                    </div>

                    <button type="submit" class="auth-btn" style="background: #3b82f6; max-width: 200px;">Update Profile</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
